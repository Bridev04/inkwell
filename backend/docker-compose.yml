services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-draftwell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-draftwell}
      POSTGRES_DB: ${POSTGRES_DB:-draftwell}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-draftwell}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
