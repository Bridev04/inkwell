name: Backend CI

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  pull_request:
    paths: ["backend/**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy app

      - name: Tests
        run: uv run pytest -v
        env:
          SECRET_KEY: ci-test-secret-only
          DATABASE_URL: postgresql+asyncpg://dummy:dummy@localhost/dummy
          DATABASE_URL_SYNC: postgresql+psycopg://dummy:dummy@localhost/dummy
          ANTHROPIC_API_KEY: dummy
